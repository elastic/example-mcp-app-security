name: Release

on:
  workflow_dispatch: # Manual trigger to test the build pipeline — no release is created
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Build project
        run: npm run build

      - name: Bundle with esbuild
        run: |
          npx esbuild dist/main.js \
            --bundle \
            --platform=node \
            --format=esm \
            --target=node22 \
            --outfile=dist/main.bundle.mjs \
            --banner:js="import{createRequire}from'module';const require=createRequire(import.meta.url);"

      - name: Pack MCPB bundle
        run: |
          npx @anthropic-ai/mcpb pack .
          echo "MCPB_FILE=$(ls *.mcpb)" >> "$GITHUB_ENV"

      - name: Pack npm tarball
        run: |
          npm pack
          cp elastic-security-mcp-app-*.tgz elastic-security-mcp-app.tgz

      - name: Build skill zips
        run: npm run skills:zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "$MCPB_FILE" \
            elastic-security-mcp-app.tgz \
            elastic-security-mcp-app-*.tgz \
            dist/skills/*.zip \
            --title "Elastic Security MCP App ${{ github.ref_name }}" \
            --generate-notes
